<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch BOT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body class="bg-dark text-white">
  <section id="app-loading" class="container py-4">
    <div class="card bg-dark text-white mb-4">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="spinner-border spinner-border-sm text-info" role="status" aria-hidden="true"></div>
        <span>Cargando...</span>
      </div>
    </div>
  </section>

  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
  <script>
    (function () {
      var hashText = String(window.location.hash || '');
      var isOauthHash = hashText.includes('access_token=') || hashText.includes('error=');

      if (!isOauthHash) {
        return;
      }

      var authUrl = new URL('auth.html', window.location.href);
      authUrl.hash = hashText;
      window.location.replace(authUrl.toString());
    })();
  </script>
  <script>
    (function () {
      var debugParam = String(new URL(window.location.href).searchParams.get('debug') || '').trim().toLowerCase();
      var debugPanelEnabled = ['1', 'true', 'yes', 'on'].includes(debugParam);
      var panel = null;
      var list = null;

      if (debugPanelEnabled) {
        panel = document.createElement('section');
        panel.id = 'debug-bootstrap-log';
        panel.style.position = 'fixed';
        panel.style.right = '8px';
        panel.style.bottom = '8px';
        panel.style.zIndex = '10000';
        panel.style.width = 'min(92vw, 760px)';
        panel.style.maxHeight = '45vh';
        panel.style.overflow = 'auto';
        panel.style.padding = '8px 10px';
        panel.style.border = '1px solid rgba(255,255,255,0.25)';
        panel.style.borderRadius = '8px';
        panel.style.background = 'rgba(0, 0, 0, 0.85)';
        panel.style.color = '#e9ecef';
        panel.style.fontFamily = 'monospace';
        panel.style.fontSize = '12px';
        panel.style.lineHeight = '1.35';

        var title = document.createElement('div');
        title.style.fontWeight = '700';
        title.style.marginBottom = '4px';
        title.textContent = 'DEBUG BOOTSTRAP';
        panel.appendChild(title);

        list = document.createElement('div');
        panel.appendChild(list);
        document.body.appendChild(panel);
      }

      var appendLine = function (label, payload) {
        var line = document.createElement('div');
        var ts = new Date().toISOString();
        var suffix = '';

        if (payload !== undefined && payload !== null) {
          if (payload instanceof Error) {
            suffix = ' ' + (payload.stack || payload.message || String(payload));
          } else if (typeof payload === 'object') {
            try {
              suffix = ' ' + JSON.stringify(payload);
            } catch (error) {
              suffix = ' ' + String(payload);
            }
          } else {
            suffix = ' ' + String(payload);
          }
        }

        line.textContent = '[' + ts + '] ' + label + suffix;
        if (list && panel) {
          list.appendChild(line);
          panel.scrollTop = panel.scrollHeight;
        }
      };

      window.twitchbotDebugEnabled = true;
      window.twitchbotLog = function (label, payload) {
        console.log('[twitchbot][debug]', label, payload);
        appendLine(label, payload);
      };

      window.twitchbotLog('index:debug-enabled', {
        href: window.location.href,
        userAgent: navigator.userAgent,
        panelEnabled: debugPanelEnabled
      });

      window.addEventListener('error', function (event) {
        window.twitchbotLog('window:error', {
          message: event.message,
          source: event.filename,
          line: event.lineno,
          column: event.colno,
          stack: event.error && event.error.stack ? event.error.stack : ''
        });
      });

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        window.twitchbotLog('window:unhandledrejection', reason);
      });
    })();
  </script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
