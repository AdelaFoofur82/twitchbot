<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch BOT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body class="bg-dark text-white">
  <main id="app" class="container py-4">
    
    <header class="mb-4 text-white">
      <h1 class="h3 mb-1">Twitch BOT</h1>
    </header>
    
    <section id="app-loading" class="card bg-dark text-white mb-4">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="spinner-border spinner-border-sm text-info" role="status" aria-hidden="true"></div>
        <span>Cargando...</span>
      </div>
    </section>

    <credentials-generator></credentials-generator>

    <overlays-section></overlays-section>

    <bot-status-card></bot-status-card>

    <bot-actions-card></bot-actions-card>

    <chat-dashboard></chat-dashboard>

    <test-alerts-panel></test-alerts-panel>

    <events-overview></events-overview>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
