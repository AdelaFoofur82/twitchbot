<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch BOT - Chat Overlay</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: transparent;
      }

      body {
        overflow: hidden;
      }

      .chat-overlay-root {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 20px;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        background: transparent;
      }

      .chat-overlay-stack {
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 6px;
        overflow: hidden;
      }

      .chat-line {
        color: #ffffff;
        font-size: 30px;
        line-height: 1.24;
        text-shadow:
          1px 1px 0 rgba(0, 0, 0, 0.85),
          -1px 1px 0 rgba(0, 0, 0, 0.85),
          1px -1px 0 rgba(0, 0, 0, 0.85),
          -1px -1px 0 rgba(0, 0, 0, 0.85),
          0 0 12px rgba(0, 0, 0, 0.8);
        font-family: Arial, Helvetica, sans-serif;
      }

      .chat-user {
        font-weight: 700;
      }

      .chat-separator {
        margin: 0 6px;
      }

      .chat-message {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <chat-overlay></chat-overlay>
    </main>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
    <script type="module" src="./src/chat-main.js"></script>
  </body>
</html>
